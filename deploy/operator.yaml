                    properties:
                      readOnlyPaths:
                        description: readOnlyPaths is a list of allowed read only
                          file paths.
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: set
                      readWritePaths:
                        description: readWritePaths is a list of allowed read write
                          file paths.
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: set
                      writeOnlyPaths:
                        description: writeOnlyPaths is a list of allowed write only
                          file paths.
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: set
                    type: object
                  network:
                    description: network defines rules for network access.
                    properties:
                      allowRaw:
                        description: allowRaw allows raw sockets.
                        type: boolean
                      allowedProtocols:
                        description: allowedProtocols keeps the allowed networking
                          protocols.
                        properties:
                          allowTcp:
                            description: allowTcp allows TCP socket connections.
                            type: boolean
                          allowUdp:
                            description: allowUdp allows UDP sockets connections.
                            type: boolean
                        type: object
                    type: object
                type: object
              mode:
                default: Enforce
                description: |-
                  mode controls the enforcement mode for the AppArmor profile.
                  In "Complain" mode, violations are logged but allowed.
                  In "Enforce" mode (the default), violations are denied.
                enum:
                - Enforce
                - Complain
                type: string
              state:
                default: Enabled
                description: |-
                  state controls whether the profile is enabled or disabled for
                  reconciliation. A disabled profile will be skipped.
                enum:
                - Enabled
                - Disabled
                type: string
            type: object
          status:
            description: status contains the observed state of the AppArmor profile.
            properties:
              conditions:
                description: conditions contains the conditions of the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              status:
                description: status is the current state of the profile across nodes.
                enum:
                - Partial
                - Disabled
                - Pending
                - InProgress
                - Installed
                - Terminating
                - Error
                type: string
            type: object
        type: object
    served: true
    storage: false
    subresources:
      status: {}
